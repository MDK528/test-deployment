name: Deploy Nodejs code on ExCloud

on:
  push:
    branches:
      -main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: action/checkout@v4

      - name: Deploy on ExCloud
        uses: appleboy/ssh-action@v1.0.3
        with: 
          host: 210.79.128.104
          username:  ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/test-deployment
            git pull
            pnpm install
            pnpm start